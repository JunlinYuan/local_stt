name: LocalSTT
options:
  bundleIdPrefix: com.localSTT
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

packages:
  LocalSTTCore:
    path: .

targets:
  LocalSTT:
    type: application
    platform: iOS
    sources:
      - path: Sources/LocalSTT
        type: group
      - path: Resources/vocabulary.txt
        buildPhase: resources
      - path: Resources/vocabulary_usage.json
        buildPhase: resources
      - path: Resources/replacements.json
        buildPhase: resources
      - path: Resources/Assets.xcassets
        buildPhase: resources
    dependencies:
      - package: LocalSTTCore
    settings:
      base:
        INFOPLIST_FILE: Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.localSTT.app
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: false
        SWIFT_VERSION: "5.9"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  LocalSTTCoreTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests/LocalSTTCoreTests
        type: group
    dependencies:
      - package: LocalSTTCore
    settings:
      base:
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: true
